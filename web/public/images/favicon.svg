<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#08090e" rx="8"/>

  <!-- Luminox glass shape — stylized glass pane with emerald glow -->
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main glass pane (rectangular with subtle depth) -->
  <rect x="16" y="16" width="32" height="32" fill="url(#glassGrad)" rx="4" opacity="0.9"/>

  <!-- Highlight reflection (top-left) -->
  <rect x="18" y="18" width="10" height="10" fill="white" rx="2" opacity="0.3"/>

  <!-- Inner border glow -->
  <rect x="16" y="16" width="32" height="32" fill="none" stroke="#10b981" stroke-width="1.5" rx="4" opacity="0.6"/>
</svg>
