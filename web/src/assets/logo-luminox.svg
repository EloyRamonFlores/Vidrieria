<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052b3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0366cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left Building (short) -->
  <g>
    <!-- Main structure -->
    <rect x="35" y="65" width="28" height="70" fill="url(#buildingGradient)" rx="2"/>
    <!-- Windows vertical lines -->
    <line x1="42" y1="65" x2="42" y2="135" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="49" y1="65" x2="49" y2="135" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="56" y1="65" x2="56" y2="135" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Center Building (tall) -->
  <g>
    <!-- Main structure -->
    <rect x="81" y="30" width="38" height="105" fill="url(#buildingGradient)" rx="2"/>
    <!-- Windows vertical lines -->
    <line x1="90" y1="30" x2="90" y2="135" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="99" y1="30" x2="99" y2="135" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="108" y1="30" x2="108" y2="135" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="117" y1="30" x2="117" y2="135" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Right Building (medium) -->
  <g>
    <!-- Main structure -->
    <rect x="137" y="50" width="28" height="85" fill="url(#buildingGradient)" rx="2"/>
    <!-- Windows vertical lines -->
    <line x1="144" y1="50" x2="144" y2="135" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="151" y1="50" x2="151" y2="135" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="158" y1="50" x2="158" y2="135" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Curved base connecting buildings -->
  <path d="M 30 135 Q 100 150 170 135" stroke="#0366cc" stroke-width="3" fill="none"/>

  <!-- LUMINOX text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#0366cc" letter-spacing="1">
    LUMINOX
  </text>

  <!-- GLASS text with yellow outline -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="none" stroke="#fbbf24" stroke-width="1.5" letter-spacing="1">
    GLASS
  </text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#0366cc" letter-spacing="1">
    GLASS
  </text>

  <!-- Yellow accent underline -->
  <line x1="70" y1="210" x2="130" y2="210" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
</svg>
